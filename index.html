<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electstat</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #171a1f;
    --muted: #5f6875;
    --soft: #f5f7fa;
    --line: #dce2ea;
    --accent: #163b66;
    --accent-soft: #e8f0f8;
  }

  * {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Arial, sans-serif;
    line-height: 1.6;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  .site-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(255, 255, 255, 0.92);
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(12px);
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1120px;
    margin: 0 auto;
    padding: 18px 24px;
  }

  .brand {
    color: var(--text);
    font-size: 1.15rem;
    font-weight: 750;
    letter-spacing: 0;
  }

  .language-switch {
    display: inline-flex;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--soft);
  }

  .language-switch button {
    min-width: 44px;
    border: 0;
    border-radius: 999px;
    padding: 7px 12px;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
  }

  .language-switch button.active {
    background: var(--accent);
    color: #ffffff;
  }

  main {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .hero {
    display: grid;
    align-items: center;
    min-height: 620px;
    padding: 96px 0 88px;
    border-bottom: 1px solid var(--line);
  }

  .hero-content {
    max-width: 760px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    margin: 0 0 18px;
    color: var(--accent);
    font-size: 0.84rem;
    font-weight: 800;
  }

  .hero h1 {
    max-width: 780px;
    margin: 0;
    color: var(--text);
    font-size: clamp(2.6rem, 7vw, 5.6rem);
    line-height: 1.04;
    font-weight: 800;
    letter-spacing: 0;
  }

  .hero-copy {
    max-width: 650px;
    margin: 28px 0 0;
    color: var(--muted);
    font-size: 1.08rem;
  }

  .hero-actions {
    margin-top: 36px;
  }

  .button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 0 20px;
    background: var(--accent);
    color: #ffffff;
    font-size: 0.96rem;
    font-weight: 750;
  }

  .section {
    padding: 88px 0;
    border-bottom: 1px solid var(--line);
  }

  .section h2 {
    margin: 0 0 30px;
    color: var(--text);
    font-size: clamp(1.8rem, 3vw, 2.5rem);
    line-height: 1.18;
    font-weight: 800;
    letter-spacing: 0;
  }

  .principles-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  .principle-card {
    min-height: 210px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 24px;
    background: #ffffff;
  }

  .principle-card h3 {
    margin: 0 0 12px;
    color: var(--text);
    font-size: 1.1rem;
    line-height: 1.3;
  }

  .principle-card p {
    margin: 0;
    color: var(--muted);
    font-size: 0.98rem;
  }

  .case-preview {
    display: grid;
    grid-template-columns: minmax(0, 0.95fr) minmax(280px, 0.55fr);
    gap: 48px;
    align-items: center;
  }

  .case-copy p {
    max-width: 670px;
    margin: 0 0 30px;
    color: var(--muted);
    font-size: 1.05rem;
  }

  .data-panel {
    border-left: 4px solid var(--accent);
    padding: 24px;
    background: var(--soft);
  }

  .data-panel .statement {
    margin: 0;
    color: var(--accent);
    font-size: 1.55rem;
    line-height: 1.32;
    font-weight: 800;
  }

  .site-footer {
    max-width: 1120px;
    margin: 0 auto;
    padding: 34px 24px 44px;
    color: var(--muted);
    font-size: 0.94rem;
  }

  @media (max-width: 820px) {
    .header-inner {
      padding: 14px 18px;
    }

    main {
      padding: 0 18px;
    }

    .hero {
      min-height: auto;
      padding: 72px 0;
    }

    .principles-grid,
    .case-preview {
      grid-template-columns: 1fr;
    }

    .section {
      padding: 64px 0;
    }
  }

  @media (max-width: 520px) {
    .hero h1 {
      font-size: 2.5rem;
    }

    .hero-copy,
    .case-copy p {
      font-size: 1rem;
    }

    .principle-card {
      min-height: auto;
      padding: 20px;
    }

    .data-panel .statement {
      font-size: 1.3rem;
    }
  }
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="#" aria-label="Electstat">Electstat</a>
    <div class="language-switch" aria-label="Language">
      <button type="button" data-lang="ko">KR</button>
      <button type="button" data-lang="en">EN</button>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <div class="hero-content">
      <p class="eyebrow" data-i18n="hero.label"></p>
      <h1 data-i18n="hero.title"></h1>
      <p class="hero-copy" data-i18n="hero.body"></p>
      <div class="hero-actions">
        <a class="button" href="#first-case" data-i18n="hero.button"></a>
      </div>
    </div>
  </section>

  <section class="section" aria-labelledby="principles-title">
    <h2 id="principles-title" data-i18n="principles.title"></h2>
    <div class="principles-grid">
      <article class="principle-card">
        <h3 data-i18n="principles.items.0.title"></h3>
        <p data-i18n="principles.items.0.body"></p>
      </article>
      <article class="principle-card">
        <h3 data-i18n="principles.items.1.title"></h3>
        <p data-i18n="principles.items.1.body"></p>
      </article>
      <article class="principle-card">
        <h3 data-i18n="principles.items.2.title"></h3>
        <p data-i18n="principles.items.2.body"></p>
      </article>
    </div>
  </section>

  <section class="section case-preview" id="first-case" aria-labelledby="case-title">
    <div class="case-copy">
      <h2 id="case-title" data-i18n="case.title"></h2>
      <p data-i18n="case.body"></p>
      <a class="button" href="#" data-i18n="case.button"></a>
    </div>
    <aside class="data-panel" aria-label="Electstat statement">
      <p class="statement" data-i18n="statement"></p>
    </aside>
  </section>
</main>

<footer class="site-footer">
  <p data-i18n="footer"></p>
</footer>

<script>
const copy = {
  ko: {
    statement: "우리는 단정하지 않습니다. 숫자로 질문합니다.",
    hero: {
      label: "선거 데이터 아카이브",
      title: "설명이 필요한 숫자를\n쉽고 투명하게 살펴봅니다",
      body: "Electstat은 공식 선거 데이터에서 관찰된 드문 패턴을\n일반인이 이해하기 쉬운 방식으로 정리합니다.\n우리는 결론을 서두르지 않습니다.\n숫자로 질문하고, 가정과 한계를 함께 보여줍니다.",
      button: "첫 번째 사례 보기"
    },
    principles: {
      title: "Electstat의 원칙",
      items: [
        {
          title: "공식 데이터 기반",
          body: "공식 자료에서 확인 가능한 숫자를 바탕으로 살펴봅니다."
        },
        {
          title: "단정하지 않는 해석",
          body: "하나의 숫자만으로 결론을 내리지 않고, 비교와 검토를 우선합니다."
        },
        {
          title: "쉬운 설명",
          body: "어려운 통계를 누구나 이해할 수 있는 문장과 시각화로 풀어냅니다."
        }
      ]
    },
    case: {
      title: "첫 번째 사례: 송도1동과 송도2동",
      body: "유권자 수와 관내 사전투표 참여자 수는 서로 달랐습니다.\n그런데 주요 두 후보의 득표수는 완전히 같았습니다.\n이 결과는 단순한 우연일까요?\n아니면 통계적으로 더 살펴볼 만한 패턴일까요?",
      button: "사례 열기"
    },
    footer: "Electstat은 결론보다 질문을 먼저 봅니다."
  },
  en: {
    statement: "We don’t conclude. We examine.",
    hero: {
      label: "Election Data Archive",
      title: "Examining numbers\nthat deserve a closer look",
      body: "Electstat organizes rare patterns observed in official election data\nin a way that is easy for the public to understand.\nWe do not rush to conclusions.\nWe ask questions with numbers, while showing assumptions and limits.",
      button: "View First Case"
    },
    principles: {
      title: "Principles of Electstat",
      items: [
        {
          title: "Based on official data",
          body: "We examine numbers that can be checked through official sources."
        },
        {
          title: "No rushed conclusions",
          body: "We do not draw conclusions from a single number. Comparison comes first."
        },
        {
          title: "Clear explanations",
          body: "We translate complex statistics into simple language and visuals."
        }
      ]
    },
    case: {
      title: "First Case: Songdo 1-dong and Songdo 2-dong",
      body: "The number of registered voters and in-district early voters differed.\nYet the vote counts for the two leading candidates were exactly the same.\nWas this a simple coincidence?\nOr is it a pattern worth examining statistically?",
      button: "Open Case"
    },
    footer: "Electstat puts questions before conclusions."
  }
};

const storageKey = "electstat-language";
const buttons = document.querySelectorAll("[data-lang]");
const translatable = document.querySelectorAll("[data-i18n]");

function getValue(path, source) {
  return path.split(".").reduce((value, key) => value && value[key], source);
}

function setLanguage(lang) {
  const selected = copy[lang] ? lang : "ko";
  document.documentElement.lang = selected;
  localStorage.setItem(storageKey, selected);

  translatable.forEach((element) => {
    const value = getValue(element.dataset.i18n, copy[selected]);
    element.textContent = value || "";
  });

  buttons.forEach((button) => {
    const active = button.dataset.lang === selected;
    button.classList.toggle("active", active);
    button.setAttribute("aria-pressed", String(active));
  });
}

buttons.forEach((button) => {
  button.addEventListener("click", () => setLanguage(button.dataset.lang));
});

setLanguage(localStorage.getItem(storageKey) || "ko");
</script>
</body>
</html>
