<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electstat</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #171a1f;
    --muted: #5f6875;
    --soft: #f5f7fa;
    --soft-strong: #eef3f8;
    --line: #dce2ea;
    --accent: #163b66;
    --accent-2: #2e6f9f;
    --accent-soft: #e8f0f8;
    --dark: #10243b;
  }

  * {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Arial, sans-serif;
    line-height: 1.6;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  .site-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(255, 255, 255, 0.92);
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(12px);
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1120px;
    margin: 0 auto;
    padding: 18px 24px;
  }

  .brand {
    color: var(--text);
    font-size: 1.15rem;
    font-weight: 750;
    letter-spacing: 0;
  }

  .language-switch {
    display: inline-flex;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--soft);
  }

  .language-switch button {
    min-width: 44px;
    border: 0;
    border-radius: 999px;
    padding: 7px 12px;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
  }

  .language-switch button.active {
    background: var(--accent);
    color: #ffffff;
  }

  main {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .hero {
    display: grid;
    align-items: center;
    min-height: 620px;
    padding: 96px 0 88px;
    border-bottom: 1px solid var(--line);
  }

  .hero-content {
    max-width: 760px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    margin: 0 0 18px;
    color: var(--accent);
    font-size: 0.84rem;
    font-weight: 800;
  }

  .hero h1 {
    max-width: 720px;
    margin: 0;
    color: var(--text);
    font-size: clamp(2.35rem, 5.6vw, 4.6rem);
    line-height: 1.12;
    font-weight: 800;
    letter-spacing: 0;
  }

  .hero-copy {
    max-width: 620px;
    margin: 28px 0 0;
    color: var(--muted);
    font-size: 1.08rem;
    white-space: pre-line;
  }

  .hero-actions {
    margin-top: 36px;
  }

  .button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 0 20px;
    background: var(--accent);
    color: #ffffff;
    font-size: 0.96rem;
    font-weight: 750;
  }

  .section {
    padding: 88px 0;
    border-bottom: 1px solid var(--line);
  }

  .section h2 {
    margin: 0 0 30px;
    color: var(--text);
    font-size: clamp(1.8rem, 3vw, 2.5rem);
    line-height: 1.18;
    font-weight: 800;
    letter-spacing: 0;
  }

  .section-intro {
    max-width: 760px;
    margin: -12px 0 34px;
    color: var(--muted);
    font-size: 1.02rem;
    white-space: pre-line;
  }

  .principles-grid,
  .three-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  .principle-card,
  .info-card,
  .ai-card,
  .district-card,
  .vote-mode-card {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 24px;
    background: #ffffff;
  }

  .principle-card {
    min-height: 210px;
  }

  .principle-card h3,
  .info-card h3,
  .ai-card h3,
  .district-card h3,
  .vote-mode-card h3 {
    margin: 0 0 12px;
    color: var(--text);
    font-size: 1.1rem;
    line-height: 1.3;
  }

  .principle-card p,
  .info-card p,
  .ai-card p,
  .district-card p,
  .vote-mode-card p {
    margin: 0;
    color: var(--muted);
    font-size: 0.98rem;
  }

  .context-label {
    display: inline-flex;
    max-width: 100%;
    margin: 0 0 14px;
    border-radius: 999px;
    padding: 5px 11px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 800;
    line-height: 1.35;
  }

  .case-preview {
    display: grid;
    grid-template-columns: minmax(0, 0.95fr) minmax(280px, 0.55fr);
    gap: 48px;
    align-items: center;
  }

  .case-copy p {
    max-width: 670px;
    margin: 0 0 30px;
    color: var(--muted);
    font-size: 1.05rem;
    white-space: pre-line;
  }

  .data-panel {
    border-left: 4px solid var(--accent);
    padding: 24px;
    background: var(--soft);
  }

  .data-panel .statement {
    margin: 0;
    color: var(--accent);
    font-size: 1.55rem;
    line-height: 1.32;
    font-weight: 800;
    white-space: pre-line;
  }

  .case-hero {
    scroll-margin-top: 90px;
    padding-top: 104px;
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
  }

  .case-hero h2 {
    max-width: 850px;
    margin-bottom: 24px;
    font-size: clamp(2rem, 4.3vw, 4rem);
    line-height: 1.15;
  }

  .case-hero-body {
    max-width: 760px;
    color: var(--muted);
    font-size: 1.08rem;
    white-space: pre-line;
  }

  .district-grid,
  .mode-grid,
  .assumption-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 18px 0 22px;
  }

  .metric {
    padding: 14px;
    border-radius: 8px;
    background: var(--soft);
  }

  .metric .label {
    display: block;
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 750;
  }

  .metric .value {
    display: block;
    margin-top: 4px;
    color: var(--text);
    font-size: 1.06rem;
    font-weight: 800;
  }

  .bar-list {
    display: grid;
    gap: 14px;
  }

  .bar-row {
    display: grid;
    gap: 7px;
  }

  .bar-meta {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    color: var(--text);
    font-size: 0.92rem;
  }

  .bar-name {
    font-weight: 750;
  }

  .bar-votes {
    color: var(--accent);
    font-weight: 800;
  }

  .bar-track {
    height: 10px;
    overflow: hidden;
    border-radius: 999px;
    background: var(--soft-strong);
  }

  .bar-fill {
    height: 100%;
    border-radius: 999px;
    background: var(--accent-2);
  }

  .bar-row.match .bar-votes {
    color: var(--accent);
  }

  .bar-row.match .bar-fill {
    background: var(--accent);
  }

  .match-box {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 28px;
    background: var(--soft);
  }

  .match-header {
    display: grid;
    grid-template-columns: minmax(100px, 0.7fr) 1fr auto 1fr;
    gap: 18px;
    margin: 8px 0 2px;
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 800;
  }

  .match-column {
    text-align: center;
  }

  .match-row {
    display: grid;
    grid-template-columns: minmax(100px, 0.7fr) 1fr auto 1fr;
    gap: 18px;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px solid var(--line);
    font-size: clamp(1.2rem, 3vw, 2rem);
    font-weight: 800;
  }

  .match-row:last-child {
    border-bottom: 0;
  }

  .match-name {
    color: var(--text);
    font-size: 1rem;
  }

  .match-value {
    color: var(--accent);
    text-align: center;
  }

  .match-equals {
    color: var(--muted);
  }

  .match-desc {
    max-width: 640px;
    margin: 24px 0 0;
    color: var(--muted);
    white-space: pre-line;
  }

  .vote-mode-card {
    background: var(--soft);
  }

  .mode-label {
    display: inline-flex;
    margin-bottom: 12px;
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 800;
  }

  .pending {
    display: flex;
    align-items: center;
    min-height: 116px;
    padding: 18px;
    border: 1px dashed #b8c7d8;
    border-radius: 8px;
    background: #ffffff;
    color: var(--muted);
    font-weight: 700;
  }

  .step-label,
  .tool-badge {
    display: inline-flex;
    margin-bottom: 14px;
    border-radius: 999px;
    padding: 4px 10px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 800;
  }

  .probability-card {
    border-radius: 10px;
    padding: clamp(26px, 5vw, 44px);
    background: var(--dark);
    color: #ffffff;
  }

  .probability-card .small {
    margin: 0 0 18px;
    color: #b9c9db;
    font-size: 0.88rem;
    font-weight: 800;
  }

  .probability-card .number {
    margin: 0;
    font-size: clamp(2.2rem, 7vw, 5rem);
    line-height: 1.05;
    font-weight: 850;
  }

  .probability-card .desc,
  .probability-card .note {
    max-width: 760px;
    margin: 24px 0 0;
    color: #d9e3ee;
    white-space: pre-line;
  }

  .list-card ul,
  .question-list {
    margin: 0;
    padding-left: 20px;
    color: var(--muted);
  }

  .list-card li,
  .question-list li {
    margin: 8px 0;
  }

  .ai-note,
  .closing-statement {
    margin: 28px 0 0;
    padding: 22px;
    border-left: 4px solid var(--accent);
    background: var(--soft);
    color: var(--muted);
    white-space: pre-line;
  }

  .closing-statement {
    color: var(--accent);
    font-size: 1.2rem;
    font-weight: 800;
  }

  .site-footer {
    max-width: 1120px;
    margin: 0 auto;
    padding: 34px 24px 44px;
    color: var(--muted);
    font-size: 0.94rem;
  }

  @media (max-width: 900px) {
    .principles-grid,
    .three-grid,
    .case-preview,
    .district-grid,
    .mode-grid,
    .assumption-grid {
      grid-template-columns: 1fr;
    }

    .meta-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 820px) {
    .header-inner {
      padding: 14px 18px;
    }

    main {
      padding: 0 18px;
    }

    .hero {
      min-height: auto;
      padding: 72px 0;
    }

    .section {
      padding: 64px 0;
    }
  }

  @media (max-width: 560px) {
    .hero h1 {
      font-size: 2.25rem;
      line-height: 1.16;
    }

    .hero-copy,
    .case-copy p,
    .case-hero-body {
      font-size: 1rem;
    }

    .principle-card,
    .info-card,
    .ai-card,
    .district-card,
    .vote-mode-card {
      padding: 20px;
    }

    .data-panel .statement {
      font-size: 1.3rem;
    }

    .match-row {
      grid-template-columns: 1fr;
      gap: 6px;
      text-align: left;
    }

    .match-header {
      grid-template-columns: 1fr;
      gap: 4px;
      margin-bottom: 12px;
    }

    .match-column {
      text-align: left;
    }

    .match-value {
      text-align: left;
    }
  }
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="#" aria-label="Electstat">Electstat</a>
    <div class="language-switch" aria-label="Language">
      <button type="button" data-lang="ko">KR</button>
      <button type="button" data-lang="en">EN</button>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <div class="hero-content">
      <p class="eyebrow" data-i18n="hero.label"></p>
      <h1 data-i18n="hero.title"></h1>
      <p class="hero-copy" data-i18n="hero.body"></p>
      <div class="hero-actions">
        <a class="button" href="#first-case" data-i18n="hero.button"></a>
      </div>
    </div>
  </section>

  <section class="section" aria-labelledby="principles-title">
    <h2 id="principles-title" data-i18n="principles.title"></h2>
    <div class="principles-grid">
      <article class="principle-card">
        <h3 data-i18n="principles.items.0.title"></h3>
        <p data-i18n="principles.items.0.body"></p>
      </article>
      <article class="principle-card">
        <h3 data-i18n="principles.items.1.title"></h3>
        <p data-i18n="principles.items.1.body"></p>
      </article>
      <article class="principle-card">
        <h3 data-i18n="principles.items.2.title"></h3>
        <p data-i18n="principles.items.2.body"></p>
      </article>
    </div>
  </section>

  <section class="section case-preview" aria-labelledby="case-preview-title">
    <div class="case-copy">
      <h2 id="case-preview-title" data-i18n="casePreview.title"></h2>
      <p data-i18n="casePreview.body"></p>
      <a class="button" href="#first-case" data-i18n="casePreview.button"></a>
    </div>
    <aside class="data-panel" aria-label="Electstat statement">
      <p class="statement" data-i18n="statement"></p>
    </aside>
  </section>

  <section class="section case-hero" id="first-case" aria-labelledby="case-detail-title">
    <p class="eyebrow" data-i18n="caseDetail.label"></p>
    <h2 id="case-detail-title" data-i18n="caseDetail.title"></h2>
    <p class="case-hero-body" data-i18n="caseDetail.body"></p>
  </section>

  <section class="section" aria-labelledby="actual-results-title">
    <h2 id="actual-results-title" data-i18n="actualResults.title"></h2>
    <div class="district-grid" id="districtCards"></div>
  </section>

  <section class="section" aria-labelledby="matching-title">
    <h2 id="matching-title" data-i18n="matching.title"></h2>
    <div class="match-box" id="matchingBox"></div>
  </section>

  <section class="section" aria-labelledby="voting-compare-title">
    <h2 id="voting-compare-title" data-i18n="votingCompare.title"></h2>
    <p class="section-intro" data-i18n="votingCompare.body"></p>
    <div class="mode-grid" id="voteModeCards"></div>
  </section>

  <section class="section" aria-labelledby="model-title">
    <h2 id="model-title" data-i18n="model.title"></h2>
    <div class="three-grid">
      <article class="info-card">
        <span class="step-label">STEP 01</span>
        <h3 data-i18n="model.steps.0.title"></h3>
        <p data-i18n="model.steps.0.body"></p>
      </article>
      <article class="info-card">
        <span class="step-label">STEP 02</span>
        <h3 data-i18n="model.steps.1.title"></h3>
        <p data-i18n="model.steps.1.body"></p>
      </article>
      <article class="info-card">
        <span class="step-label">STEP 03</span>
        <h3 data-i18n="model.steps.2.title"></h3>
        <p data-i18n="model.steps.2.body"></p>
      </article>
    </div>
  </section>

  <section class="section" aria-labelledby="probability-title">
    <div class="probability-card">
      <p class="small" data-i18n="probability.label"></p>
      <h2 id="probability-title" class="number" data-i18n="probability.number"></h2>
      <p class="desc" data-i18n="probability.desc"></p>
      <p class="note" data-i18n="probability.note"></p>
    </div>
  </section>

  <section class="section" aria-labelledby="analogy-title">
    <h2 id="analogy-title" data-i18n="analogy.title"></h2>
    <div class="three-grid">
      <article class="info-card">
        <h3 data-i18n="analogy.items.0.title"></h3>
        <p data-i18n="analogy.items.0.body"></p>
      </article>
      <article class="info-card">
        <h3 data-i18n="analogy.items.1.title"></h3>
        <p data-i18n="analogy.items.1.body"></p>
      </article>
      <article class="info-card">
        <h3 data-i18n="analogy.items.2.title"></h3>
        <p data-i18n="analogy.items.2.body"></p>
      </article>
    </div>
  </section>

  <section class="section" aria-labelledby="limits-title">
    <h2 id="limits-title" data-i18n="limits.title"></h2>
    <div class="assumption-grid" id="limitCards"></div>
  </section>

  <section class="section" aria-labelledby="ai-title">
    <h2 id="ai-title" data-i18n="ai.title"></h2>
    <p class="section-intro" data-i18n="ai.body"></p>
    <div class="three-grid" id="aiCards"></div>
    <p class="ai-note" data-i18n="ai.note"></p>
  </section>

  <section class="section" aria-labelledby="next-title">
    <h2 id="next-title" data-i18n="next.title"></h2>
    <ul class="question-list" id="questionList"></ul>
    <p class="closing-statement" data-i18n="next.closing"></p>
  </section>
</main>

<footer class="site-footer">
  <p data-i18n="footer"></p>
</footer>

const storageKey = "electstat-language";
const buttons = document.querySelectorAll("[data-lang]");
const translatable = document.querySelectorAll("[data-i18n]");

function getValue(path, source) {
  return path.split(".").reduce((value, key) => value && value[key], source);
}

function formatNumber(value) {
  return new Intl.NumberFormat("en-US").format(value);
}

function formatRate(part, total) {
  return ((part / total) * 100).toFixed(1) + "%";
}

function voteText(votes, lang) {
  const unit = copy[lang].dataLabels.voteUnit;
  return lang === "ko" ? `${formatNumber(votes)}${unit}` : `${formatNumber(votes)} ${unit}`;
}

function personText(value, lang) {
  const unit = copy[lang].dataLabels.personUnit;
  return lang === "ko" ? `${formatNumber(value)}${unit}` : `${formatNumber(value)} ${unit}`;
}

function renderDistrictCards(lang) {
  const labels = copy[lang].dataLabels;
  const cards = document.getElementById("districtCards");
  const maxVotes = Math.max(
    ...Object.values(caseData.earlyVoting).flatMap((district) => district.candidates.map((candidate) => candidate.votes))
  );

  cards.innerHTML = Object.entries(caseData.earlyVoting).map(([key, district]) => {
    const candidateBars = district.candidates.map((candidate) => {
      const candidateName = copy[lang].candidateLabels[candidate.name];
      const match = candidate.name === "박찬대" || candidate.name === "유정복";
      const width = Math.max((candidate.votes / maxVotes) * 100, 3);
      return `
        <div class="bar-row ${match ? "match" : ""}">
          <div class="bar-meta">
            <span class="bar-name">${candidateName}</span>
            <span class="bar-votes">${voteText(candidate.votes, lang)}</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width: ${width}%"></div></div>
        </div>
      `;
    }).join("");

    return `
      <article class="district-card">
        <h3>${labels[key]}</h3>
        <span class="context-label">${labels.dataType}</span>
        <div class="meta-grid">
          <div class="metric">
            <span class="label">${labels.voters}</span>
            <span class="value">${personText(district.voters, lang)}</span>
          </div>
          <div class="metric">
            <span class="label">${labels.earlyVoters}</span>
            <span class="value">${personText(district.earlyVoters, lang)}</span>
          </div>
          <div class="metric">
            <span class="label">${labels.turnout}</span>
            <span class="value">${formatRate(district.earlyVoters, district.voters)}</span>
          </div>
        </div>
        <div class="bar-list">${candidateBars}</div>
      </article>
    `;
  }).join("");
}

function renderMatchingBox(lang) {
  const labels = copy[lang].candidateLabels;
  const dataLabels = copy[lang].dataLabels;
  const matching = copy[lang].matching;
  const candidates = ["박찬대", "유정복"];
  const box = document.getElementById("matchingBox");

  const rows = candidates.map((name) => {
    const left = caseData.earlyVoting.songdo1.candidates.find((candidate) => candidate.name === name).votes;
    const right = caseData.earlyVoting.songdo2.candidates.find((candidate) => candidate.name === name).votes;
    return `
      <div class="match-row">
        <span class="match-name">${labels[name]}</span>
        <span class="match-value">${voteText(left, lang)}</span>
        <span class="match-equals">=</span>
        <span class="match-value">${voteText(right, lang)}</span>
      </div>
    `;
  }).join("");

  box.innerHTML = `
    <span class="context-label">${dataLabels.dataBasis}</span>
    <div class="match-header">
      <span></span>
      <span class="match-column">${dataLabels.songdo1}</span>
      <span></span>
      <span class="match-column">${dataLabels.songdo2}</span>
    </div>
    ${rows}
    <p class="match-desc">${matching.desc}</p>
  `;
}

function renderVoteModeCards(lang) {
  const labels = copy[lang].dataLabels;
  const cards = document.getElementById("voteModeCards");

  cards.innerHTML = Object.entries(caseData.earlyVoting).map(([key, district]) => {
    const leading = district.candidates.slice(0, 2).map((candidate) => {
      return `${copy[lang].candidateLabels[candidate.name]} ${voteText(candidate.votes, lang)}`;
    }).join(" · ");

    return `
      <article class="vote-mode-card">
        <h3>${labels[key]}</h3>
        <div class="metric">
          <span class="mode-label">${labels.earlyVoting}</span>
          <span class="value">${personText(district.earlyVoters, lang)}</span>
          <p>${leading}</p>
        </div>
        <div class="pending">
          <span>${labels.pending}</span>
        </div>
      </article>
    `;
  }).join("");
}

function renderListCards(containerId, cards, cardClass = "info-card list-card") {
  const container = document.getElementById(containerId);
  container.innerHTML = cards.map((card) => {
    const badge = card.name ? `<span class="tool-badge">${card.name}</span>` : "";
    const items = card.items.map((item) => `<li>${item}</li>`).join("");
    return `
      <article class="${cardClass}">
        ${badge}
        <h3>${card.title}</h3>
        <ul>${items}</ul>
      </article>
    `;
  }).join("");
}

function renderQuestionList(lang) {
  const list = document.getElementById("questionList");
  list.innerHTML = copy[lang].next.questions.map((question) => `<li>${question}</li>`).join("");
}

function setLanguage(lang) {
  const selected = copy[lang] ? lang : "ko";
  document.documentElement.lang = selected;
  localStorage.setItem(storageKey, selected);

  translatable.forEach((element) => {
    const value = getValue(element.dataset.i18n, copy[selected]);
    element.textContent = value || "";
  });

  buttons.forEach((button) => {
    const active = button.dataset.lang === selected;
    button.classList.toggle("active", active);
    button.setAttribute("aria-pressed", String(active));
  });

  renderDistrictCards(selected);
  renderMatchingBox(selected);
  renderVoteModeCards(selected);
  renderListCards("limitCards", copy[selected].limits.cards);
  renderListCards("aiCards", copy[selected].ai.cards, "ai-card list-card");
  renderQuestionList(selected);
}

buttons.forEach((button) => {
  button.addEventListener("click", () => setLanguage(button.dataset.lang));
});

setLanguage(localStorage.getItem(storageKey) || "ko");
</script>
</body>
</html>
